services:
  # Backend FastAPI Web Service
  - type: web
    name: tourist-discovery-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    dockerCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tourist-discovery-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tourist-discovery-redis
          property: connectionString
      - key: USE_REDIS
        value: "true"
      - key: GOOGLE_MAPS_API_KEY
        sync: false  # Can be input manually in Render dashboard
      - key: RATE_LIMIT_LIMIT
        value: "60"
      - key: RATE_LIMIT_WINDOW
        value: "60"
      - key: BACKEND_CORS_ORIGINS
        value: '["http://localhost", "http://localhost:80", "http://localhost:5173", "https://your-vercel-frontend.vercel.app"]'

  # Redis Service for Caching & Rate Limiting
  - type: redis
    name: tourist-discovery-redis
    plan: free
    ipAllowList: [] # Restrict to internal connections only

databases:
  # PostgreSQL Database
  - name: tourist-discovery-db
    plan: free
